<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiskClause — Analyseur de contrats IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">RiskClause</span>
        <span class="logo-tag">IA</span>
      </div>
      <p class="header-sub">Détection des clauses abusives, trompeuses et restrictives par intelligence artificielle</p>
    </header>

    <!-- INPUT PANEL -->
    <section class="panel" id="inputPanel">

      <div class="upload-zone" id="uploadZone">
        <div class="upload-inner">
          <div class="upload-icon">↑</div>
          <p class="upload-title">Glissez un PDF ici</p>
          <p class="upload-sub">ou</p>
          <label class="btn-file" for="fileInput">Parcourir…</label>
          <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>
      </div>

      <div class="divider">
        <span>ou collez le texte directement</span>
      </div>

      <div class="textarea-wrap">
        <textarea id="contractText" placeholder="Collez votre contrat ici (CGU, bail, CDI, SaaS, prestation…)"></textarea>
        <div class="char-count" id="charCount">0 caractères</div>
      </div>

      <div class="actions">
        <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()">
          <span class="btn-icon">◈</span>
          <span>Analyser le contrat</span>
        </button>
        <button class="btn-clear" onclick="clearAll()">Effacer</button>
        <span class="status-msg" id="status"></span>
      </div>
    </section>

    <!-- OUTPUT -->
    <section id="output"></section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="app.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "02fe74b8ccc14ec0bff929e3987e0627"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
