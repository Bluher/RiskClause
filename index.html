<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="piAzvY7GH_OY8XwDqu4XmgL6BLenIY79kRlmte7jcns" />
  <title>RiskClause — Analyseur de contrats IA</title>
  <link rel="canonical" href="https://bluher.github.io/RiskClause/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- ================= SEO RISKCLAUSE ================= -->

<meta name="description" content="RiskClause analyse automatiquement vos contrats (CGU, bail, SaaS, CDI) et détecte les clauses abusives grâce à l’intelligence artificielle.">
<meta name="keywords" content="analyse contrat IA, clauses abusives, contrat SaaS, CGU analyse, legal AI, risk analysis contract">
<meta name="author" content="RiskClause">

<meta name="robots" content="index, follow">
<meta name="language" content="fr">

<link rel="canonical" href="https://bluher.github.io/RiskClause/">

<!-- Open Graph (Facebook / Discord / WhatsApp) -->
<meta property="og:title" content="RiskClause — Analyseur de contrats IA">
<meta property="og:description" content="Détecte automatiquement les clauses abusives et risques dans tes contrats grâce à l’IA.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bluher.github.io/RiskClause/">
<meta property="og:image" content="https://bluher.github.io/RiskClause//preview.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="RiskClause — Analyseur de contrats IA">
<meta name="twitter:description" content="Analyse intelligente de contrats et détection de clauses abusives.">
<meta name="twitter:image" content="https://bluher.github.io/RiskClause//preview.png">

<!-- Performance -->
<meta name="theme-color" content="#0a0b0d">
</head>
<body>

  <div class="bg-grid"></div>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">RiskClause</span>
        <span class="logo-tag">IA</span>
      </div>
      <p class="header-sub">Détection des clauses abusives, trompeuses et restrictives par intelligence artificielle</p>
    </header>

    <!-- INPUT PANEL -->
    <section class="panel" id="inputPanel">

      <div class="upload-zone" id="uploadZone">
        <div class="upload-inner">
          <div class="upload-icon">↑</div>
          <p class="upload-title">Glissez un PDF ici</p>
          <p class="upload-sub">ou</p>
          <label class="btn-file" for="fileInput">Parcourir…</label>
          <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>
      </div>

      <div class="divider">
        <span>ou collez le texte directement</span>
      </div>

      <div class="textarea-wrap">
        <textarea id="contractText" placeholder="Collez votre contrat ici (CGU, bail, CDI, SaaS, prestation…)"></textarea>
        <div class="char-count" id="charCount">0 caractères</div>
      </div>

      <div class="actions">
        <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()">
          <span class="btn-icon">◈</span>
          <span>Analyser le contrat</span>
        </button>
        <button class="btn-clear" onclick="clearAll()">Effacer</button>
        <span class="status-msg" id="status"></span>
      </div>
    </section>

    <!-- OUTPUT -->
    <section id="output"></section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="app.js"></script>
